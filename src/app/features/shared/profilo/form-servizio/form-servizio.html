<div class="form-page-container">
  <div class="form-card">
    <h2>➕ Attiva una nuova tipologia di servizio</h2>
    <p class="descrizione-info">Scegli tra i servizi prestabiliti nel sistema. Vengono mostrati solo quelli non ancora attivi sul tuo profilo.</p>

    <div class="campo-form">
      <label>Seleziona Servizio</label>
      <select [(ngModel)]="servizioSelezionato" class="select-tendina">
        <option value="" disabled selected>-- Scegli un servizio disponibile --</option>
        <option *ngFor="let tipo of tipologieDisponibili" [value]="tipo">
          🎯 {{ tipo }}
        </option>
      </select>
    </div>

    <p *ngIf="tipologieDisponibili.length === 0" class="alert-esaurito">
      ⚠️ Hai già attivato tutte le tipologie di servizio disponibili nel nostro database!
    </p>

    <div class="gruppo-pulsanti">
      <button type="button" class="btn-conferma" (click)="aggiungi()" [disabled]="!servizioSelezionato">Attiva Servizio</button>
      <button type="button" class="btn-annulla" (click)="annulla()">Annulla</button>
    </div>
  </div>
</div>
