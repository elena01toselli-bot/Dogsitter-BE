<div class="profilo-page">

  <div class="intestazione">
    <div class="titolo-wrapper">
      <span class="icona-titolo">
        <span *ngIf="ruolo === 'dogsitter'">🐾</span>
        <span *ngIf="ruolo === 'cliente'">👤</span>
      </span>
      <h1 class="titolo">Il mio Profilo ({{ ruolo === 'dogsitter' ? 'Dog Sitter' : 'Cliente' }})</h1>
    </div>
    <button class="btn-salva" (click)="salvaAnagrafica()">💾 Salva Modifiche</button>
  </div>

  <div class="form-card" *ngIf="utente">
    
    <div class="sezione">
      <h2 class="sezione-titolo">👤 Informazioni Anagrafiche</h2>
      <div class="riga-form">
        <div class="campo-form">
          <label>Nome</label>
          <input type="text" [(ngModel)]="utente.nomeBattesimo" />
        </div>
        <div class="campo-form">
          <label>Cognome</label>
          <input type="text" [(ngModel)]="utente.cognome" />
        </div>
      </div>
      <div class="campo-form">
        <label>Telefono</label>
        <input type="tel" [(ngModel)]="utente.nTel" />
      </div>
    </div>

    <div class="sezione">
      <h2 class="sezione-titolo">📍 Indirizzo di Residenza</h2>
      <div class="campo-form">
        <label>Via</label>
        <input type="text" [(ngModel)]="utente.via" />
      </div>
      <div class="riga-form">
        <div class="campo-form">
          <label>N° Civico</label>
          <input type="text" [(ngModel)]="utente.nCivico" />
        </div>
        <div class="campo-form">
          <label>CAP</label>
          <input type="text" [(ngModel)]="utente.cap" />
        </div>
        <div class="campo-form">
          <label>Provincia</label>
          <input type="text" [(ngModel)]="utente.provincia" maxlength="2" />
        </div>
      </div>
    </div>

    <app-profilo-dogsitter *ngIf="ruolo === 'dogsitter'"></app-profilo-dogsitter>
    <app-profilo-cliente *ngIf="ruolo === 'cliente'"></app-profilo-cliente>

  </div>
</div>
