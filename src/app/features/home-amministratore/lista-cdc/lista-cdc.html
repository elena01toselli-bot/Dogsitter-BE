
<!--se non avessi usato caricamento nell'aspettare il backend avrei visto il titolo 
la barra di ricerca alcuni pulsanti mentre la lista e le province nel menù a tendina no 
avrei visto solo l'opzione tutte le province-->

<div class="lista-page">

  <!-- LOADING -->
  <div *ngIf="caricamento" class="loading">
    ⏳ Caricamento in corso...
  </div>

  <!-- ERRORE -->
  <div *ngIf="errore" class="errore">
    ⚠️ {{ errore }}
  </div>


  <!-- CONTENUTO PRINCIPALE -->
   <!-- se non c'è stato nessuno errrore o non stiamo aspettando la risposta del backend allora mostra il contenuto -->
    <div *ngIf="!caricamento && !errore">
    <!-- ── Intestazione ── -->
    <div class="intestazione">

      <!-- Bottone torna indietro 
      Event binding -->
      <button class="btn-torna" (click)="torna()">← Torna</button>
      
      <!-- Titolo con icona tra i due bottoni -->
      <div class="titolo-wrapper">

        <!-- Interpolazione (one way data binding) per mostrare l'icona e il titolo dinamicamente --
        legati alle funzioni getIconaPagina() e getTitoloPagina() nel TypeScript -->
        <span class="icona-titolo">{{ iconaPagina }}</span>
        <h1 class="titolo">{{ titoloPagina }}</h1>
      </div>
      
      <!-- qui abbiamo event binding -->
      <button class="btn-aggiungi" (click)="aggiungi()">+ Aggiungi</button>
    </div>

    <!-- ── Barra di filtro ── -->
    <div class="barra-filtro">

      <!-- Ricerca per nome -->
      <!-- [(ngModel)] è una direttiva Angular che crea un two-way 
      data binding tra l'input e la variabile 'termineDiRicerca' nel TypeScript 
      se lui scrive si modifica in typescript se io lo rendo vuoto in typescript qui ritorna il placeholder-->
      <input
        class="input-ricerca"
        type="text"
      
        placeholder="Cerca per nome..."

        [(ngModel)]="termineDiRicerca"
      />

      <!-- Filtro per provincia -->
      <!-- il tag HTML <select> serve specificamente per creare una lista di scelta
        se l'utente cambia selezione → aggiorna provinciaFiltro con il campo value dell'option selezionata
        se provinciaFiltro cambia nel TypeScript → aggiorna il select.
        all'inizio abbiamo come opzione predefinita "Tutte le province" quindi provinciaFiltro=""-->
        <!-- [(ngModel)] serve anche per la direzione da ts a HTML perchè noi abbiamo un 
         bottone per resettare i filtri, che quando lo clicchi provinciaFiltro="" -->
      <select class="select-provincia" [(ngModel)]="provinciaFiltro">
        <option value="">Tutte le province</option>
        <!-- *ngFor itera sull'array 'province' e crea un'option per ognuna, [] è un binding alla variabile prov
        quindi si cicla su province si crea un'option per ogni provincia poi value con il binding assume il valore
        di quella provincia e grazie all'interpolatione poi nel menu a tendina si visualizza il nome della provincia -->
        <!--*ngFor ti cicla su un array e ti crea un tag uguale a quello in cui è inserito (vedi sotto anche)-->
        <option *ngFor="let prov of province" [value]="prov">{{ prov }}</option>
      </select>

      <button class="btn-filtra" (click)="filtra()">🔍 Filtra</button>

      <!-- Mostra il  pulsante di reset nel DOM solo se c'è qualcosa da resettare -->
      <button
        class="btn-reset"
        *ngIf="termineDiRicerca || provinciaFiltro"
        (click)="resetFiltri()"
      >✕ Reset</button>

    </div>

    <!-- ── Contatore risultati ── -->
    <!-- Mostra il numero di risultati trovati, con accordo singolare/plurale -->
    <p class="contatore">
      {{ entitaFiltrate.length }} risultat{{ entitaFiltrate.length === 1 ? 'o' : 'i' }} trovat{{ entitaFiltrate.length === 1 ? 'o' : 'i' }}
    </p>

    <!-- ── Lista entità ── -->
    <div class="lista">

      <!-- Messaggio se non ci sono risultati -->
      <div class="nessun-risultato" *ngIf="entitaFiltrate.length === 0">
        <span>😕</span>
        <p>Nessun risultato trovato</p>
      </div>

      <!-- *ngFor itera su entitaFiltrate e crea una riga per ognuna
        con tutte le info e i bottoni dentro perchè replica tutto il blocco di div in cui è messo -->
      <div class="riga" *ngFor="let entita of entitaFiltrate">

        <!-- Info sinistra: nome + provincia -->
        <div class="info">
          <span class="nome">{{ getNome(entita) }}</span>
          <span class="provincia">📍 {{ getProvincia(entita) }}</span>
        </div>

        <!-- Azioni destra: Modifica + Elimina --> 
        <div class="azioni">
          <button class="btn-modifica" (click)="modifica(entita)">✏️ Modifica</button>
          <button class="btn-elimina" (click)="elimina(entita)">🗑️</button>
        </div>

      </div>

    </div>

  </div>
</div>
