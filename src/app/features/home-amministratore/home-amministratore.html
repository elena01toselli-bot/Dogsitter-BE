
<!--<div> — Division, contenitore generico senza significato semantico. 
Non aggiunge nulla visivamente da solo; serve a raggruppare elementi per applicargli stile o comportamento.
questo è un elemento di blocco e come tale occupa tutta la larghezza disponibile e qualsiasi elemento dopo
viene spinto a capo la stessa cosa h1,p -->
<!--la classe serve solo per collegarlo al file.css-->
<div class="admin-home">

  <!--<h1> — Intestazione di livello 1, utilizzata per il titolo principale della pagina -->
  <h1 class="titolo"> Benvenuto Amministratore</h1>

  <!--Paragraph, un blocco di testo. Il browser lo tratta come elemento block 
  (occupa tutta la larghezza disponibile e va a capo prima e dopo) infatti senza css tutti i testi e le righe
  partirebbero da sx -->
  <p class="sottotitolo">Quale entità vuoi gestire?</p>

  <div class="cards-container">

    <!-- Card Campo di Addestramento -->
     <!--quando si clicca su tutta la card perchè noi abbiamo messo click in div che 
     prende tutta la sua area,si chiama la navigateTo con il parametro 'campo' (event binding) e 
     si passa alla funzione il parametro campo -->
     <!--io posso associare un evento a qualsiasi tag HTML basta usare l'attributo (nome_evento)="nome_funzione"-->
    <div class="card" (click)="navigateTo('campo')">

      <!-- Come <div> ma inline: non va a capo, occupa solo lo spazio necessario -->
      <span class="icona">🐕‍🦺</span>
      <h2>Campi di Addestramento</h2>
      <p>Gestisci i profili dei campi e le lezioni disponibili</p>
    </div>

    <!-- Card Dog Sitter -->
    <div class="card" (click)="navigateTo('dogsitter')">
      <span class="icona">🐾</span>
      <h2>Dog Sitter</h2>
      <p>Gestisci i profili dei dog sitter e le prenotazioni</p>
    </div>

    <!-- Card Utenti -->
    <div class="card" (click)="navigateTo('utente')">
      <span class="icona">👤</span>
      <h2>Utenti</h2>
      <p>Gestisci gli account degli utenti registrati</p>
    </div>

  </div>

</div>
