<div class="ds-shell">

  <!-- ══════════════════════════════════════
       SIDEBAR
       ══════════════════════════════════════ -->
  <aside class="sidebar" [class.chiusa]="!sidebarAperta">

    <!-- Avatar + nome dogsitter -->
    <div class="sidebar-header">
      <div class="avatar">🐾</div>
      <div class="ds-info" *ngIf="sidebarAperta">
        <span class="ds-nome">{{ nomeDogsitter }}</span>
        <span class="ds-ruolo">Dog Sitter</span>
      </div>
    </div>

    <!-- Divisore -->
    <hr class="divisore" />

    <!-- Voci di menù -->
    <!-- routerLink naviga alla rotta figlia, routerLinkActive aggiunge la classe CSS 'attivo'
         automaticamente quando quella rotta è quella corrente -->
    <nav class="menu">

      <a class="voce-menu"
         routerLink="prenotazioni"
         routerLinkActive="attivo">
        <span class="icona-menu">📋</span>
        <span class="label-menu" *ngIf="sidebarAperta">Prenotazioni</span>
      </a>

      <a class="voce-menu"
         routerLink="profilo"
         routerLinkActive="attivo">
        <span class="icona-menu">👤</span>
        <span class="label-menu" *ngIf="sidebarAperta">Il mio Profilo</span>
      </a>

    </nav>

    <!-- Logout in fondo alla sidebar -->
    <div class="sidebar-footer">
      <button class="btn-logout" (click)="logout()">
        <span class="icona-menu">🚪</span>
        <span class="label-menu" *ngIf="sidebarAperta">Logout</span>
      </button>
    </div>

  </aside>

  <!-- ══════════════════════════════════════
       CONTENUTO PRINCIPALE
       qui Angular carica la rotta figlia attiva
       (prenotazioni oppure profilo)
       ══════════════════════════════════════ -->
  <main class="contenuto-principale">

    <!-- Pulsante per aprire/chiudere la sidebar -->
    <button class="btn-toggle" (click)="toggleSidebar()" [title]="sidebarAperta ? 'Chiudi menu' : 'Apri menu'">
      {{ sidebarAperta ? '◀' : '▶' }}
    </button>

    <!-- Angular inserisce qui il componente della rotta figlia corrente -->
    <router-outlet></router-outlet>

  </main>

</div>
