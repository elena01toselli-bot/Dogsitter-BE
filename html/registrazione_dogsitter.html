<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PawTal - Registrazione Dog Sitter</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- Stili condivisi -->
  <link rel="stylesheet" href="global.css">
  <!-- Stili specifici pagina -->
  <link rel="stylesheet" href="registrazione_dogsitter.css">
</head>
<body>

  <!-- HEADER -->
  <header class="main-header">
    <img src="logo.png" alt="PawTal Logo" class="logo-main">
  </header>

  <!-- MAIN -->
  <main>
    <section class="form-card">
      <h2>REGISTRAZIONE DOG SITTER </h2>

      <form id="formDogsitter" novalidate>

        <!-- DATI PERSONALI -->
        <div class="input-group" id="nomeGroup">
          <label for="nome">NOME</label>
          <input type="text" id="nome" name="nome" placeholder="Es. Marco">
          <p class="error-message">Inserisci il tuo nome</p>
        </div>

        <div class="input-group" id="cognomeGroup">
          <label for="cognome">COGNOME</label>
          <input type="text" id="cognome" name="cognome" placeholder="Es. Rossi">
          <p class="error-message">Inserisci il tuo cognome</p>
        </div>

        <div class="input-group" id="nicknameGroup">
          <label for="nickname">NICKNAME 🦴</label>
          <input type="text" id="nickname" name="nickname" placeholder="Il tuo nickname">
          <p class="error-message">Inserisci un nickname</p>
        </div>

        <div class="input-group" id="passwordGroup">
          <label for="password">PASSWORD 🔑</label>
          <input type="password" id="password" name="password" placeholder="Crea una password">
          <p class="error-message">Inserisci una password</p>
        </div>

        <hr class="divider">

        <!-- INDIRIZZO -->
        <div class="input-group">
          <label>INDIRIZZO 🏠</label>
          <div class="input-row">
            <div class="input-group flex-3">
              <p class="sub-label">VIA</p>
              <input type="text" id="via" name="via" placeholder="Es. Via Roma">
            </div>
            <div class="input-group flex-1">
              <p class="sub-label">CIVICO</p>
              <input type="text" id="civico" name="civico" placeholder="12">
            </div>
          </div>
          <div class="input-row" style="margin-top: 0;">
            <div class="input-group flex-1">
              <p class="sub-label">CAP</p>
              <input type="text" id="cap" name="cap" placeholder="40121" maxlength="5">
            </div>
            <div class="input-group flex-2">
              <p class="sub-label">PROVINCIA</p>
              <input type="text" id="provincia" name="provincia" placeholder="Es. BO" maxlength="2">
            </div>
          </div>
        </div>

        <hr class="divider">

        <!-- GIORNI DI LAVORO -->
        <div class="days-section">
          <label>GIORNI DI LAVORO 🗓️</label>
          <div class="days-grid">
            <label class="day-box"><input type="checkbox" name="giorni" value="LUN"><span>LUN</span></label>
            <label class="day-box"><input type="checkbox" name="giorni" value="MAR"><span>MAR</span></label>
            <label class="day-box"><input type="checkbox" name="giorni" value="MER"><span>MER</span></label>
            <label class="day-box"><input type="checkbox" name="giorni" value="GIO"><span>GIO</span></label>
            <label class="day-box"><input type="checkbox" name="giorni" value="VEN"><span>VEN</span></label>
            <label class="day-box"><input type="checkbox" name="giorni" value="SAB"><span>SAB</span></label>
            <label class="day-box"><input type="checkbox" name="giorni" value="DOM"><span>DOM</span></label>
          </div>
        </div>

        <!-- TAGLIE ACCETTATE -->
        <div class="radio-section">
          <label>TAGLIE ACCETTATE 🐕</label>
          <div class="checkbox-group">
            <label><input type="checkbox" name="taglia" value="piccola"> PICCOLA</label>
            <label><input type="checkbox" name="taglia" value="media"> MEDIA</label>
            <label><input type="checkbox" name="taglia" value="grande"> GRANDE</label>
          </div>
        </div>

        <button type="submit" class="btn-submit">REGISTRATI</button>
      </form>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="main-footer">
    <p><strong>Progetto d'Esame</strong></p>
    <p>Alberto Bagnolini - Elena Toselli</p>
    <p>AA. 2025-2026</p>
  </footer>

  <script>
    const form = document.getElementById('formDogsitter');

    const campiObbligatori = ['nome', 'cognome', 'nickname', 'password'];

    campiObbligatori.forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById(id + 'Group').classList.remove('error');
      });
    });

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      let hasError = false;

      campiObbligatori.forEach(id => {
        const group = document.getElementById(id + 'Group');
        const input = document.getElementById(id);
        group.classList.remove('error');
        if (!input.value.trim()) {
          group.classList.add('error');
          hasError = true;
        }
      });

      if (!hasError) {
        alert('Registrazione inviata! ✅');
      }
    });
  </script>

</body>
</html>
