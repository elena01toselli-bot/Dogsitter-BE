<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>PawTal - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login1.css">
</head>
<body>

  <!-- HEADER -->
  <header class="main-header">
    <img src="logo.png" alt="PawTal Logo" class="logo-main">
  </header>

  <!-- LOGIN -->
  <main>
    <section class="login-card">
      <h1>ACCEDI AL TUO ACCOUNT</h1>

      <form id="loginForm" novalidate>
        <div class="input-group" id="nicknameGroup">
          <label for="nickname">NICKNAME 🦴</label>
          <input type="text" id="nickname" name="nickname" placeholder="Il tuo nickname">
          <p class="error-message">Inserisci il tuo nickname</p>
        </div>

        <div class="input-group" id="passwordGroup">
          <label for="password">PASSWORD 🔑</label>
          <input type="password" id="password" name="password" placeholder="La tua password">
          <p class="error-message">Password errata</p>
        </div>

        <button type="submit" class="btn btn-main">ACCEDI</button>
      </form>

      <div class="registration-prompt">
        <p>NON SEI REGISTRATO?<br>REGISTRATI COME</p>
        <div class="btn-group">
          <button class="btn btn-secondary">DOG SITTER</button>
          <button class="btn btn-secondary">CLIENTE</button>
        </div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="main-footer">
    <div class="footer-info">
      <p><strong>Progetto d'Esame</strong></p>
      <p>Alberto Bagnolini - Elena Toselli</p>
      <p>AA.2025-2026</p>
    </div>
  </footer>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const nickname = document.getElementById('nickname').value.trim();
      const password = document.getElementById('password').value.trim();
      const pwGroup = document.getElementById('passwordGroup');
      const nickGroup = document.getElementById('nicknameGroup');

      // Reset errori
      pwGroup.classList.remove('error');
      nickGroup.classList.remove('error');

      let hasError = false;

      if (!nickname) {
        nickGroup.classList.add('error');
        nickGroup.querySelector('.error-message').textContent = 'Inserisci il tuo nickname';
        hasError = true;
      }

      if (!password) {
        pwGroup.classList.add('error');
        pwGroup.querySelector('.error-message').textContent = 'Inserisci la password';
        hasError = true;
      }

      if (!hasError) {
        alert('Login inviato! ✅');
      }
    });

    // Rimuovi errore mentre si digita
    document.getElementById('nickname').addEventListener('input', function() {
      document.getElementById('nicknameGroup').classList.remove('error');
    });
    document.getElementById('password').addEventListener('input', function() {
      document.getElementById('passwordGroup').classList.remove('error');
    });
  </script>
</body>
</html>
